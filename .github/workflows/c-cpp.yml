name: Zircon CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: install deps
      run: sudo apt update && sudo apt install -y gcc make
    - name: make
      run: make
    - name: make clean
      run: make clean
